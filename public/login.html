<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Deportes Premium</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #07111f;
      --bg-2: #0b1730;
      --panel: rgba(12, 19, 36, 0.82);
      --line: rgba(255, 255, 255, 0.08);
      --text: #f5f7ff;
      --muted: #9fb0cf;
      --accent: #00c2ff;
      --accent-2: #355cff;
      --danger: #ff5b73;
      --success: #25d366;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.4);
      --radius: 24px;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: "Poppins", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(0, 194, 255, 0.18), transparent 22%),
        radial-gradient(circle at 85% 10%, rgba(53, 92, 255, 0.14), transparent 20%),
        radial-gradient(circle at 50% 100%, rgba(255, 77, 103, 0.10), transparent 25%),
        linear-gradient(180deg, #07111f 0%, #0b1730 50%, #09121f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.55;
    }

    body::before {
      width: 240px;
      height: 240px;
      background: rgba(0, 194, 255, 0.2);
      top: 8%;
      left: 8%;
    }

    body::after {
      width: 280px;
      height: 280px;
      background: rgba(53, 92, 255, 0.16);
      right: 6%;
      bottom: 8%;
    }

    .login-shell {
      width: 100%;
      max-width: 430px;
      position: relative;
      z-index: 1;
    }

    .login-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: var(--shadow);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
    }

    .brand {
      margin-bottom: 24px;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #dce9ff;
      font-size: 0.82rem;
      margin-bottom: 16px;
    }

    .brand h1 {
      font-size: 1.9rem;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .brand p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-size: 0.92rem;
      color: #d7e5ff;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      min-height: 52px;
      padding: 14px 15px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      outline: none;
      transition: 0.18s ease;
    }

    .field input::placeholder {
      color: #91a5c9;
    }

    .field input:focus {
      border-color: rgba(0, 194, 255, 0.35);
      box-shadow: 0 0 0 4px rgba(0, 194, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
    }

    .login-btn {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-weight: 700;
      font-size: 0.98rem;
      cursor: pointer;
      margin-top: 6px;
      transition: 0.18s ease;
      box-shadow: 0 14px 30px rgba(0, 194, 255, 0.22);
    }

    .login-btn:hover,
    .login-btn:focus {
      transform: translateY(-1px) scale(1.01);
      filter: brightness(1.03);
      outline: none;
    }

    .error {
      margin-top: 12px;
      min-height: 20px;
      color: #ffb8c2;
      font-size: 0.92rem;
    }

    .login-footer {
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .demo-box {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #c8d7f0;
      font-size: 0.88rem;
      line-height: 1.7;
    }

    .demo-box strong {
      color: #fff;
    }

    .status-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 6px rgba(37, 211, 102, 0.12);
      margin-right: 8px;
      vertical-align: middle;
    }

    @media (max-width: 540px) {
      body {
        padding: 16px;
      }

      .login-card {
        padding: 22px;
        border-radius: 20px;
      }

      .brand h1 {
        font-size: 1.65rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="brand">
        <div class="brand-badge">
          <span class="status-dot"></span>
          Acceso seguro IPTV
        </div>

        <h1>Deportes Premium</h1>
        <p>
          Inicia sesión para acceder al reproductor y a la lista de canales streaming.
        </p>
      </div>

      <form id="loginForm">
        <div class="field">
          <label for="username">Usuario</label>
          <input
            id="username"
            name="username"
            type="text"
            placeholder="Ingresa tu usuario"
            autocomplete="username"
            required
          />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Ingresa tu contraseña"
            autocomplete="current-password"
            required
          />
        </div>

        <button class="login-btn" type="submit">Entrar al sistema</button>
        <div class="error" id="errorBox"></div>

        <div id="activeSessionsBox" class="active-sessions-box" hidden>
          <h3>Conexiones activas</h3>
          <p class="active-sessions-help">
            Ya alcanzaste el máximo permitido. Puedes cerrar una conexión activa y volver a ingresar.
          </p>
          <div id="activeSessionsList"></div>
        </div>
      </form>

      <!--<div class="demo-box">
        Demo de acceso:<br>
        Usuario: <strong>admin</strong> / Contraseña: <strong>123456</strong><br>
        Usuario: <strong>tv</strong> / Contraseña: <strong>iptv123</strong>
      </div>-->

      <div class="login-footer">
        Bienvenidos a la diversion
      </div>
    </div>
  </div>

 <script>
    fetch("/api/session")
      .then((res) => {
        if (res.ok) {
          window.location.href = "/";
        }
      })
      .catch(() => {});

    const loginForm = document.getElementById("loginForm");
    const errorBox = document.getElementById("errorBox");
    const activeSessionsBox = document.getElementById("activeSessionsBox");
    const activeSessionsList = document.getElementById("activeSessionsList");

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderActiveSessions(sessions, username, password) {
      activeSessionsList.innerHTML = "";

      if (!sessions || !sessions.length) {
        activeSessionsBox.hidden = true;
        return;
      }

      activeSessionsBox.hidden = false;

      sessions.forEach((session) => {
        const card = document.createElement("div");
        card.className = "session-card";

        card.innerHTML = `
          <div class="session-meta"><strong>IP:</strong> ${escapeHtml(session.ip_address || "-")}</div>
          <div class="session-meta"><strong>Dispositivo:</strong> ${escapeHtml(session.user_agent || "-")}</div>
          <div class="session-meta"><strong>Creada:</strong> ${escapeHtml(session.created_at || "-")}</div>
          <div class="session-meta"><strong>Última actividad:</strong> ${escapeHtml(session.last_seen || "-")}</div>
          <button class="close-session-btn" type="button">Cerrar esta conexión</button>
        `;

        const btn = card.querySelector(".close-session-btn");

        btn.addEventListener("click", async () => {
          btn.disabled = true;
          btn.textContent = "Cerrando conexión...";

          try {
            const response = await fetch("/api/close-session", {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                username,
                password,
                sessionId: session.session_id
              })
            });

            const data = await response.json();

            if (!response.ok) {
              errorBox.textContent = data.message || "No se pudo cerrar la conexión";
              btn.disabled = false;
              btn.textContent = "Cerrar esta conexión";
              return;
            }

            errorBox.textContent = "Conexión cerrada. Intenta ingresar de nuevo.";
            card.remove();

            if (!activeSessionsList.children.length) {
              activeSessionsBox.hidden = true;
            }
          } catch (error) {
            errorBox.textContent = "Error de conexión al cerrar la sesión";
            btn.disabled = false;
            btn.textContent = "Cerrar esta conexión";
          }
        });

        activeSessionsList.appendChild(card);
      });
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      errorBox.textContent = "";
      activeSessionsBox.hidden = true;
      activeSessionsList.innerHTML = "";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const response = await fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          errorBox.textContent = data.message || "No se pudo iniciar sesión";

          if (data.code === "MAX_SESSIONS" && Array.isArray(data.sessions)) {
            renderActiveSessions(data.sessions, username, password);
          }

          return;
        }

        window.location.href = "/";
      } catch (error) {
        errorBox.textContent = "Error de conexión con el servidor";
      }
    });
  </script>
</body>
</html>
