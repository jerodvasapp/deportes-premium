<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Acceso a Deportes Premium" />
  <title>Login - Deportes Premium</title>

  <link rel="icon" href="data:," />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #07111f;
      --bg-2: #0b1730;
      --panel: rgba(12, 19, 36, 0.82);
      --line: rgba(255, 255, 255, 0.08);
      --text: #f5f7ff;
      --muted: #9fb0cf;
      --accent: #00c2ff;
      --accent-2: #355cff;
      --danger: #ff5b73;
      --success: #25d366;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.4);
      --radius: 24px;
      --transition: 0.18s ease;
    }

    html,
    body {
      min-height: 100%;
    }

    /*html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }*/

    body {
      font-family: "Poppins", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(0, 194, 255, 0.18), transparent 22%),
        radial-gradient(circle at 85% 10%, rgba(53, 92, 255, 0.14), transparent 20%),
        radial-gradient(circle at 50% 100%, rgba(255, 77, 103, 0.10), transparent 25%),
        linear-gradient(180deg, #07111f 0%, #0b1730 50%, #09121f 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.55;
      pointer-events: none;
    }

    body::before {
      width: 240px;
      height: 240px;
      background: rgba(0, 194, 255, 0.2);
      top: 8%;
      left: 8%;
    }

    body::after {
      width: 280px;
      height: 280px;
      background: rgba(53, 92, 255, 0.16);
      right: 6%;
      bottom: 8%;
    }

    .login-shell {
      width: 100%;
      max-width: 430px;
      position: relative;
      z-index: 1;
      margin: 24px 0;
    }

    .login-card {
      background: rgba(10,18,35,0.55);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
    }

    .brand {
      margin-bottom: 24px;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #dce9ff;
      font-size: 0.82rem;
      margin-bottom: 16px;
    }

    .brand h1 {
      font-size: 1.9rem;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .brand p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-size: 0.92rem;
      color: #d7e5ff;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      min-height: 52px;
      padding: 14px 15px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      outline: none;
      transition: var(--transition);
    }

    .field input::placeholder {
      color: #91a5c9;
    }

    .field input:focus {
      border-color: rgba(0, 194, 255, 0.35);
      box-shadow: 0 0 0 4px rgba(0, 194, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
    }

    .login-btn {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-weight: 700;
      font-size: 0.98rem;
      cursor: pointer;
      margin-top: 6px;
      transition: var(--transition);
      box-shadow: 0 14px 30px rgba(0, 194, 255, 0.22);
    }

    .login-btn:hover,
    .login-btn:focus {
      transform: translateY(-1px) scale(1.01);
      filter: brightness(1.03);
      outline: none;
    }

    .error {
      margin-top: 12px;
      min-height: 20px;
      color: #ffb8c2;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .login-footer {
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.7;
      text-align: center;
    }

    .demo-box {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #c8d7f0;
      font-size: 0.88rem;
      line-height: 1.7;
    }

    .demo-box strong {
      color: #fff;
    }

    .status-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 6px rgba(37, 211, 102, 0.12);
      margin-right: 8px;
      vertical-align: middle;
    }

    .active-sessions-box {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .active-sessions-box h3 {
      margin: 0 0 8px;
      font-size: 1rem;
      line-height: 1.4;
    }

    .active-sessions-help {
      margin: 0 0 12px;
      color: #c8d7f0;
      font-size: 0.88rem;
      line-height: 1.6;
    }

    #activeSessionsList {
      max-height: 260px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .session-card {
      padding: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .session-card + .session-card {
      margin-top: 10px;
    }

    .session-meta {
      color: #c8d7f0;
      font-size: 0.84rem;
      line-height: 1.6;
      word-break: break-word;
    }

    .close-session-btn {
      width: 100%;
      min-height: 42px;
      margin-top: 10px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, #ff5b73, #d90429);
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
    }

    .close-session-btn:hover,
    .close-session-btn:focus {
      transform: translateY(-1px);
      filter: brightness(1.03);
      outline: none;
    }

    .close-session-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    @media (max-width: 540px) {
      body {
        padding: 16px;
      }

      .login-card {
        padding: 22px;
        border-radius: 20px;
      }

      .brand h1 {
        font-size: 1.65rem;
      }
    }

    .site-logo{
      height:40px;
      width:auto;
    }
    
    .login-logo{
      width:160px;
      display:block;
      margin:0 auto 18px auto;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.25));
    }

    .login-subtext{
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="brand">
        <div class="brand-badge">
          <span class="status-dot"></span>
          Acceso seguro
        </div>

        <img src="/img/logo.png" alt="Deportes Premium" class="login-logo">
        <p class="login-subtext">Inicia sesión para acceder.</p>
      </div>

      <form id="loginForm">
        <div class="field">
          <label for="username">Usuario</label>
          <input
            id="username"
            name="username"
            type="text"
            placeholder="Ingresa tu usuario"
            autocomplete="username"
            required
          />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Ingresa tu contraseña"
            autocomplete="current-password"
            required
          />
        </div>

        <button class="login-btn" type="submit">Entrar al sistema</button>
        <div class="error" id="errorBox"></div>

      </form>

      <div class="login-footer">
        Acceso solo para usuarios registrados.<br>
        pensada para escritorio, móvil y Android TV.
      </div>
    </div>
  </div>

  <script>
    fetch("/api/session")
      .then((res) => {
        if (res.ok) {
          window.location.href = "/";
        }
      })
      .catch(() => {});

    const loginForm = document.getElementById("loginForm");
    const errorBox = document.getElementById("errorBox");
    
    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

      loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      errorBox.textContent = "";
      
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const response = await fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          errorBox.textContent = data.message || "No se pudo iniciar sesión";

          if (data.code === "MAX_SESSIONS" && Array.isArray(data.sessions)) {
            renderActiveSessions(data.sessions, username, password);
          }

          return;
        }

        window.location.href = "/";
      } catch (error) {
        errorBox.textContent = "Error de conexión con el servidor";
      }
    });
  </script>
</body>
</html>
